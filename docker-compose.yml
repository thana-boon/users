# Local-only testing stack: Next.js app + PostgreSQL, isolated to this machine.
# Not for shared/remote use. Bring up with:  docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolos-users-postgres
    restart: unless-stopped
    environment:
      # Credentials come from .env only — no hardcoded defaults. Compose aborts
      # with the given message if POSTGRES_USER / POSTGRES_PASSWORD are unset.
      POSTGRES_DB: ${POSTGRES_DB:-users}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      # host:container — Postgres is reachable from the host (npm run dev) at :5002.
      - "5002:5432"
    volumes:
      - schoolos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-users}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: creates/updates tables from the Drizzle schema, then exits.
  # Runs after postgres is healthy and before the app starts, so a fresh
  # `docker compose up` yields a ready-to-use database (no manual db:push).
  migrate:
    build:
      context: .
      target: migrator
    container_name: schoolos-users-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-users}"
    restart: "no"

  app:
    build: .
    container_name: schoolos-users-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Inside compose the DB host is the service name "postgres".
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-users}"
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?set FIELD_ENCRYPTION_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      # Keep false for plain-HTTP LAN access (http://<ip>:3002); set true behind HTTPS.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      STUDENT_EMAIL_DOMAIN: ${STUDENT_EMAIL_DOMAIN:-sukhon.ac.th}
    ports:
      - "3002:3002"

  # One-shot bulk seed: loads .example/*.xlsx into the DB (teachers + students).
  # The Excel files are PII and live NEITHER in git NOR the image — they are
  # bind-mounted read-only from the host at run time. Put the two .xlsx files in
  # ./.example/ on the host, then run:
  #   docker compose run --rm seed
  # Guarded by a profile so a plain `docker compose up` never triggers it.
  seed:
    build:
      context: .
      target: migrator          # migrator image has full deps (tsx) + scripts/
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-users}"
      # Must match the app's key — seed encrypts password/citizen_id on insert.
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?set FIELD_ENCRYPTION_KEY in .env}
      STUDENT_EMAIL_DOMAIN: ${STUDENT_EMAIL_DOMAIN:-sukhon.ac.th}
    volumes:
      - ./.example:/app/.example:ro   # host xlsx -> container, read-only
    command: ["npm", "run", "seed"]
    restart: "no"

volumes:
  schoolos_pg_data:
